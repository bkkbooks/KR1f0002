body:
  text: 孝經一卷開宗明義章第一仲尼居仲尼孔子字居謂閒居曾子侍曾子孔子弟子侍謂侍坐子曰先王有至德要道以順天下民用和睦上下無怨孝者德之至道之要也言先代聖德之主能順天下人心行此至要之化則上下臣人和睦無怨女知之乎曾子避席曰參不敏何足以知之參曾子名也禮師有問避席起荅敏達也言參不達何足知此至要之義女音汝下同子曰夫孝德之本也人之行莫大於孝故爲德本夫音符後竝同敎之所由生也言敎從孝而生復坐吾語女曾參起對故使復坐語去聲身體髮膚受之父母不敢毀傷孝之始也父母全而生之己當全而歸之故不敢毀傷立身行道揚名於後世以顯父母孝之終也言能立身行此孝道自然名揚後世光榮其親故行孝以不毀爲先揚名爲後夫孝始於事親中於事君終於立身言行孝以事親爲始事君爲中忠孝道著乃能揚名榮親故曰終於立身也大雅云無念爾祖聿脩厥德詩大雅也無念念也聿述也厥其也義取恒念先祖述脩其德天子章第二子曰愛親者不敢惡於人博愛也惡烏路反敬親者不敢慢於人廣敬也愛敬盡於事親而德敎加於百姓刑于四海刑法也君行博愛廣敬之道使人皆不慢惡其親則德敎加被天下當爲四夷之所法則也盡津忍反蓋天子之孝也蓋猶略也孝道廣大此略言之甫刑云一人有慶兆民賴之甫刑即尙書呂刑也一人天子也慶善也十億曰兆義取天子行孝兆人皆賴其善諸侯章第三在上不驕髙而不危諸侯列國之君貴在人上可謂髙矣而能不驕則免危也制節謹度滿而不溢費用約儉謂之制節愼行禮法謂之謹度無禮爲驕奢泰爲溢溢音逸髙而不危所以長守貴也滿而不溢所以長守富也富貴不離其身然後能保其社稷而和其民人列國皆有社稷其君主而祭之言富貴常在其身則長爲社稷之主而人自和平也離力智反蓋諸侯之孝也詩云戰戰兢兢如臨深淵如履薄冰戰戰恐懼兢兢戒愼臨深恐墜履薄恐陷義取爲君恒須戒愼兢居陵反卿大夫章第四非先王之法服不敢服服者身之表也先王制五服各有等差言卿大夫遵守禮法不敢僭上偪下非先王之法言不敢道非先王之德行不敢行法言謂禮法之言德行謂道德之行若言非法行非德則虧孝道故不敢也德行下孟反註之行下擇行行滿同是故非法不言非道不行言必守法行必遵道口無擇言身無擇行言行皆遵法道所以無可擇也言滿天下無口過行滿天下無怨惡禮法之言焉有口過道德之行自無怨惡惡去聲三者備矣然後能守其宗廟三者服言行也禮卿大夫立三廟以奉先祖言能備此三者則能長守宗廟之祀蓋卿大夫之孝也詩云夙夜匪懈以事一人夙早也懈惰也義取爲卿大夫能早夜不惰敬事其君也懈佳賣反士章第五資於事父以事母而愛同資於事父以事君而敬同資取也言愛父與母同敬父與君同故母取其愛而君取其敬兼之者父也言事父兼愛與敬也故以孝事君則忠移事父孝以事於君則爲忠矣以敬事長則順移事兄敬以事於長則爲順矣忠順不失以事其上然後能保其禄位而守其祭祀能盡忠順以事君長則常安禄位永守祭祀蓋士之孝也詩云夙興夜寐無忝爾所生忝辱也所生謂父母也義取早起夜寐無辱其親也忝吐簟反庶人章第六用天之道春生夏長秋斂冬藏舉事順時此用天道也分地之利分別五土視其髙下各盡所宜此分地利也謹身節用以養父母身恭謹則逺恥辱用節省則免飢寒公賦旣足則私養不闕養羊尙反此庶人之孝也庶人爲孝唯此而巳故自天子至於庶人孝無終始而患不及者未之有也始自天子終於庶人尊卑雖殊孝道同致而患不能及者未之有也言無此理故曰未有三才章第七曾子曰甚哉孝之大也參聞行孝無限髙卑始知孝之爲大也子曰夫孝天之經也地之義也民之行也經常也利物爲義孝爲百行之首人之恒德若三辰運天而有常五土分地而爲義也行下孟反下同天地之經而民是則之天有常明地有常利言人法則天地亦以孝爲常行也則天之明因地之利以順天下是以其敎不肅而成其政不嚴而治法天明以爲常因地利以行義順此以施政敎則不待嚴肅而成理也先王見敎之可以化民也見因天地敎化人之易也是故先之以博愛而民莫遺其親君愛其親則人化之無有遺其親者陳之以德義而民興行陳說德義之美爲衆所慕則人起心而行之先之以敬讓而民不爭君行敬讓則人化而不爭導之以禮樂而民和睦禮以檢其跡樂以正其心則和睦矣示之以好惡而民知禁示好以引之示惡以止之則人知有禁令不敢犯也好如字又呼報反惡如字又烏路反詩云赫赫師尹民具爾瞻赫赫明盛貌也尹氏爲太師周之三公也義取大臣助君行化人皆瞻之也孝治章第八子曰昔者明王之以孝治天下也言先代聖明之王以至德要道化人是爲孝理不敢遺小國之臣而況於公侯伯子男乎小國之臣至卑者耳王尙接之以禮況於五等諸侯是廣敬也故得萬國之懽心以事其先王萬國舉其大數也言行孝道以理天下皆得懽心則各以其職來助祭也治國者不敢侮於鰥寡而況於士民乎理國謂諸侯也鰥寡國之微者君尙不敢輕侮況知禮義之士乎侮亡甫反鰥古頑反故得百姓之懽心以事其先君諸侯能行孝理得所統之懽心則皆恭事助其祭享也治家者不敢失於臣妾而況於妻子乎理家謂卿大夫臣妾家之賤者妻子家之貴者故得人之懽心以事其親卿大夫位以材進受禄養親若能孝理其家則得小大之懽心助其奉養夫然故生則親安之祭則鬼享之夫然者然上孝理皆得懽心則存安其榮沒享其祭是以天下和平災害不生禍亂不作上敬下懽存安沒享人用和睦以致太平則災害禍亂無因而起故明王之以孝治天下也如此言明王以孝爲理則諸侯以下化而行之故致如此福應詩云有覺德行四國順之覺大也義取天子有大德行則四方之國順而行之行下孟反下之行同聖治章第九曾子曰敢問聖人之德無以加於孝乎曾子問明王孝理以致和平又問聖人德敎更有大於孝否子曰天地之性人爲貴貴其異於萬物也人之行莫大於孝孝者德之本也孝莫大於嚴父萬物資始於乾人倫資父爲天故孝行之大莫過尊嚴其父也嚴父莫大於配天則周公其人也謂父爲天雖無貴賤然以父配天之禮始自周公故曰其人也昔者周公郊祀后稷以配天后稷周之始祖也郊謂圜丘祀天也周公攝政因行郊天之祭乃尊始祖以配之也宗祀文王於明堂以配上帝明堂天子布政之宮也周公因祀五方上帝於明堂乃尊文王以配之也是以四海之內各以其職來祭君行嚴配之禮則德敎刑於四海海內諸侯各脩其職來助祭也夫聖人之德又何以加於孝乎言無大於孝者故親生之膝下以養父母日嚴親猶愛也膝下謂孩幼之時也言親愛之心生於孩幼比及年長漸識義方則日加尊嚴能致敬於父母也養羊尙反聖人因嚴以敎敬因親以敎愛聖人因其親嚴之心敦以愛敬之敎故出以就傅趨而過庭以敎敬也抑搔癢痛縣衾篋枕以敎愛也聖人之敎不肅而成其政不嚴而治聖人順民心以行愛敬制禮則以施政敎亦不待嚴肅而成理也其所因者本也本謂孝也父子之道天性也君臣之義也父子之道天性之常加以尊嚴又有君臣之義父母生之續莫大焉父母生子傳體相續人倫之道莫大於斯君親臨之厚莫重焉謂父爲君以臨於已恩義之厚莫重於斯故不愛其親而愛他人者謂之悖德不敬其親而敬他人者謂之悖禮言盡愛敬之道然後施敎於人違此則於德禮爲悖也悖蒲對反以順則逆民無則焉行敎以順人心今自逆之則下無所法則也不在於善而皆在於凶德善謂身行愛敬也凶謂悖其德禮也雖得之君子不貴也言悖其德禮雖得志於人上君子之所不貴也君子則不然不悖德禮也言思可道行思可樂思可道而後言人必信也思可樂而後行人必恱也行下孟反樂音洛德義可尊作事可法立德行義不違道正故可尊也制作事業動得物宜故可法也容止可觀進退可度容止威儀也必合規矩則可觀也進退動靜也不越禮法則可度也以臨其民是以其民畏而愛之則而象之君行六事臨於其人則下畏其威愛其德皆放象於君也故能成其德敎而行其政令上正身以率下下順上而法之則德敎成政令行也詩云淑人君子其儀不忒淑善也忒差也義取君子威儀不差爲人法則淑常六反忒他得反紀孝行章第十行下孟反子曰孝子之事親也居則致其敬平居必盡其敬養則致其樂就養能致其懽養羊尙反下同樂音洛病則致其憂色不滿容行不正履疾甚曰病喪則致其哀擗踊哭泣盡其哀情祭則致其嚴齋戒沐浴明發不寐五者備矣然後能事親五者闕一則未爲能事親者居上不驕當莊敬以臨下也爲下不亂當恭謹以奉上也在醜不爭醜衆也爭競也當和順以從衆也居上而驕則亡爲下而亂則刑在醜而爭則兵謂以兵刃相加三者不除雖日用三牲之養猶爲不孝也三牲太牢也孝以不毀爲先言上三事皆可亡身而不除之雖日致太牢之養固非孝也五刑章第十一子曰五刑之屬三千而罪莫大於不孝五刑謂墨劓剕宮大辟也條有三千而罪之大者莫過不孝要君者無上君者臣之稟命也而敢要之是無上也要於驕反非聖人者無法聖人制作禮法而敢非之是無法也非孝者無親善事父母爲孝而敢非之是無親也此大亂之道也言人有上三惡豈惟不孝乃是大亂之道廣要道章第十二子曰敎民親愛莫善於孝敎民禮順莫善於悌言敎人親愛禮順無加於孝悌也移風易俗莫善於樂風俗移易先入樂聲變隨人心正由君德正之與變因樂而彰故曰莫善於樂安上治民莫善於禮禮所以正君臣父子之別明男女長幼之序故可以安上化下也禮者敬而巳矣敬者禮之本也故敬其父則子恱敬其兄則弟恱敬其君則臣恱敬一人而千萬人恱居上敬下盡得懽心故曰恱也所敬者寡而恱者衆此之謂要道也廣至德章第十三子曰君子之敎以孝也非家至而日見之也言敎不必家到戶至日見而語之但行孝於內其化自流於外敎以孝所以敬天下之爲人父者也敎以悌所以敬天下之爲人兄者也舉孝悌以爲敎則天下之爲人子弟者無不敬其父兄也敎以臣所以敬天下之爲人君者也舉臣道以爲敎則天下之爲人臣者無不敬其君也詩云愷悌君子民之父母愷樂也悌易也義取君以樂易之道化人則爲天下蒼生之父母也愷苦亥反悌徒禮反非至德其孰能順民如此其大者乎廣揚名章第十四子曰君子之事親孝故忠可移於君以孝事君則忠事兄悌故順可移於長以敬事長則順長丁丈反居家理故治可移於官君子所居則化故可移於官也是以行成於內而名立於後世矣脩上三德於內名自傳於後代行下孟反諫爭章第十五爭去聲篇內竝同曾子曰若夫慈愛恭敬安親揚名則聞命矣敢問子從父之令可謂孝乎事父有隱無犯又敬不違故疑而問之也子曰是何言與是何言與有非而從成父不義理所不可故再言之與平聲昔者天子有爭臣七人雖無道不失其天下諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家降殺以兩尊卑之差爭謂諫也言雖無道爲有爭臣則終不至失天下亡家國也士有爭友則身不離於令名令善也益者三友言受忠吿故不失其善名離力智反父有爭子則身不陷於不義父失則諫故免陷於不義故當不義則子不可以不爭於父臣不可以不爭於君不爭則非忠孝故當不義則爭之從父之令又焉得爲孝乎焉於虔反應感章第十六子曰昔者明王事父孝故事天明事母孝故事地察王者父事天母事地言能敬事宗廟則事天地能明察也長幼順故上下治君能尊諸父先諸兄則長幼之道順君人之化理天地明察神明彰矣事天地能明察則神感至誠而降福祐故曰彰也故雖天子必有尊也言有父也必有先也言有兄也父謂諸父兄謂諸兄皆祖考之胤也禮君讌族人與父兄齒也宗廟致敬不忘親也言能敬事宗廟則不敢忘其親也脩身愼行恐辱先也天子雖無上於天下猶脩持其身謹愼其行恐辱先祖而毀盛業也宗廟致敬鬼神著矣事宗廟能盡敬則祖考來格享於克誠故曰著也孝悌之至通於神明光于四海無所不通能敬宗廟順長幼以極孝悌之心則至性通於神明光於四海故曰無所不通詩云自西自東自南自北無思不服義取德敎流行莫不服義從化也事君章第十七子曰君子之事上也上謂君也進思盡忠進見於君則思盡忠節退思補過君有過失則思補益將順其美將行也君有美善則順而行之匡救其惡匡正也救止也君有過惡則正而止之故上下能相親也下以忠事上上以義接下君臣同德故能相親詩云心乎愛矣遐不謂矣中心藏之何日忘之遐逺也義取臣心愛君雖離左右不謂爲逺愛君之志常藏心中無日暫忘也喪親章第十八子曰孝子之喪親也生事巳畢死事未見故發此章喪如字又丁浪反哭不偯氣竭而息聲不委曲偯於豈反禮無容觸地無容言不文不爲文飾服美不安不安美飾故服衰麻聞樂不樂悲哀在心故不樂也不樂音洛食旨不甘旨美也不甘美味故䟽食水飲此哀慼之情也謂上六句三日而食敎民無以死傷生毀不滅性此聖人之政也不食三日哀毀過情滅性而死皆虧孝道故聖人制禮施敎不令至於殞滅喪不過三年示民有終也三年之喪天下達禮使不肖企及賢者俯從夫孝子有終身之憂聖人以三年爲制者使人知有終竟之限也爲之棺椁衣衾而舉之周尸爲棺周棺爲椁衣謂斂衣衾被也舉謂舉尸內於棺也椁音郭陳其簠簋而哀戚之簠簋祭器也陳奠素器而不見親故哀戚也簠音甫簋音軌擗踊哭泣哀以送之男踊女擗祖載送之擗婢亦反踊音勇卜其宅兆而安措之宅墓穴也兆營域也葬事大故卜之兆卦也廣雅云葬地爲之宗廟以鬼享之立廟祔祖之後則以鬼禮享之春秋祭祀以時思之寒暑變移益用增感以時祭祀展其孝思也生事愛敬死事哀戚生民之本盡矣死生之義備矣孝子之事親終矣愛敬哀戚孝行之始終也備陳死生之義以盡孝子之情孝經一卷
