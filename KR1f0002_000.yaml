  text: 孝經序
  hash: sha256:7324576a15a58c3501e7a0419d3eb45c8986f2efffad6894aaee5a455b9705da
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1f0002_SBCK_000-1a}
body:
  text: 唐玄宗皇帝御製朕聞上古其風朴略雖因心之孝巳萌而資敬之禮猶簡及乎仁義既有親譽益著聖人知孝之可以教人也故因嚴以教敬因親以教愛於是以順移忠之道昭矣立身揚名之義彰矣子曰吾志在春秋行在孝經行下孟反下同是知孝者德之本歟經曰昔者明王之以孝理天下也不敢遺小國之臣而況於公侯伯子男乎朕嘗三復斯言三息暫反景行先哲雖無德教加於百姓庶幾廣愛刑于四海嗟乎夫子沒而微言絶異端起而大義乖況泯絶於秦泯彌忍反得之者皆煨燼之末煨烏恢反燼徐忍反濫觴於漢濫盧闞反傳之者皆糟粕之餘粕匹角反故魯史春秋學開五傳國風雅頌分為四詩去聖逾逺源流益別近觀孝經舊注踳駮尤甚踳尺尹反駮北角反至於跡相祖述殆且百家殆音待業擅專門猶將十室希升堂者必自開戶牖攀逸駕者必騁殊軌轍騁丑郢反是以道隱小成言隱浮僞且傳以通經為義傳直戀反義以必當為主至當歸一精義無二安得不翦其繁蕪當去聲下同而撮其樞要也韋昭王肅先儒之領袖虞翻劉邵抑又次焉劉炫明安國之本炫音縣陸澄譏康成之注在理或當何必求人今故特舉六家之異同會五經之旨趣趣七聚反約文敷暢義則昭然分注錯經理亦條貫寫之琬琰琬音宛琰以冉反庶有補於將來且夫子談經志取垂訓雖五孝之用則別而百行之源不殊是以一章之中凡有數句一句之內意有兼明具載則文繁略之又義闕今存于疏用廣發揮
